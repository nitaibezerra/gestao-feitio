<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gestão de Feitio — Luz Branca</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,200;0,300;0,400;0,500;1,300&family=Inter:wght@200;300;400;500&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --bg: #fafaf8;
    --bg-2: #f2f2ef;
    --surface: #ffffff;
    --ink: #1c2024;
    --ink-soft: #5a6672;
    --ink-faint: #9aa3ab;
    --linha: #e8e8e3;
    --linha-strong: #d8d8d2;

    /* Azul firmamento — ação */
    --azul: #6b8cb8;
    --azul-claro: #b8cce0;
    --azul-profundo: #3a5a82;

    /* Domínio */
    --verde: #7ba88c;
    --daime: #b87a7a;
    --cozimento: #b08a5a;
    --agua-forte: #8a8376;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    font-weight: 300;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .serif { font-family: 'Fraunces', 'Instrument Serif', serif; font-weight: 300; letter-spacing: -0.02em; }
  .mono { font-family: 'IBM Plex Mono', monospace; font-weight: 400; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
  button:focus-visible { outline: 1px solid var(--azul); outline-offset: 2px; }

  .app-shell {
    width: 100%;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 50% -20%, var(--aura-top, rgba(184,204,224,0.28)), transparent 60%),
      radial-gradient(ellipse at bottom right, var(--aura-bottom, rgba(184,204,224,0.08)), transparent 55%),
      var(--bg);
    padding: 40px 56px 32px;
    display: flex;
    flex-direction: column;
    gap: 40px;
  }

  @keyframes pulse-soft {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

const TWEAKS = /*EDITMODE-BEGIN*/{
  "palette": "luz-rainha",
  "showCreditos": true,
  "showFooter": true,
  "density": "confortavel"
}/*EDITMODE-END*/;

// ---- PALETAS ----
const PALETAS = {
  "luz-branca":     { nome: "Luz Branca",  sub: "azul sobre papel",       azul: "#6b8cb8", azulClaro: "#b8cce0", azulProfundo: "#3a5a82", auraTop: "rgba(184,204,224,0.28)", auraBottom: "rgba(184,204,224,0.08)" },
  "luz-mata":       { nome: "Luz & Mata",  sub: "verde folha + papel",    azul: "#7ba88c", azulClaro: "#c6dcc8", azulProfundo: "#4a7a5a", auraTop: "rgba(123,168,140,0.22)", auraBottom: "rgba(184,204,224,0.08)" },
  "luz-firmamento": { nome: "Firmamento",  sub: "azul profundo, firmeza", azul: "#4a7ab0", azulClaro: "#a8c0de", azulProfundo: "#2d4a70", auraTop: "rgba(107,140,184,0.28)", auraBottom: "rgba(184,204,224,0.10)" },
  "luz-rainha":     { nome: "Rainha",      sub: "verde luz, branco puro", azul: "#8bb062", azulClaro: "#c8d8b2", azulProfundo: "#5a7a3e", auraTop: "rgba(168,200,150,0.20)", auraBottom: "rgba(223,232,210,0.14)" },
};

// ---- DADOS ----
const NOW = new Date(2026, 3, 17, 14, 32, 0);

const initialState = {
  feitio: {
    nome: "Feitio de Abril/2026",
    inicio: new Date(2026, 3, 16, 7, 0),
    feitor: "José",
    foguista: "Swidou",
    casinha: "Casinha da Sede",
  },
  fornalha: { bocas: 5 },
  panelas: [
    { id:"p1", numero:1, boca:1, conteudo:{tipo:"agua"},
      volumeAtualL:58, metaTiragem:40,
      entradaFogoEm: new Date(2026,3,17,12,40),
      proxTiragem:{tipo:"cozimento",grau:1},
      tiragens:[
        {ordem:1,tipo:"cozimento",grau:1,volume:31,momento:new Date(2026,3,16,10,15)},
        {ordem:2,tipo:"cozimento",grau:2,volume:30,momento:new Date(2026,3,16,14,40)},
      ]
    },
    { id:"p2", numero:2, boca:2, conteudo:{tipo:"cozimento",ordem:2},
      volumeAtualL:72, metaTiragem:45,
      entradaFogoEm: new Date(2026,3,17,10,15),
      proxTiragem:{tipo:"cozimento",grau:3},
      tiragens:[
        {ordem:1,tipo:"cozimento",grau:1,volume:30,momento:new Date(2026,3,16,10,20)},
        {ordem:2,tipo:"cozimento",grau:2,volume:30,momento:new Date(2026,3,16,14,45)},
      ]
    },
    { id:"p3", numero:3, boca:3, conteudo:{tipo:"cozimento",ordem:3},
      volumeAtualL:48, metaTiragem:30,
      entradaFogoEm: new Date(2026,3,17,8,45),
      proxTiragem:{tipo:"daime",grau:1},
      tiragens:[]
    },
    { id:"p4", numero:4, boca:4, conteudo:{tipo:"cozimento",ordem:4},
      volumeAtualL:36, metaTiragem:20,
      entradaFogoEm: new Date(2026,3,17,11,20),
      proxTiragem:{tipo:"daime",grau:2},
      tiragens:[]
    },
  ],
  toneis: [
    { numero:1, tipo:"cozimento", ordem:1, volumeL:52, capacidadeL:120 },
    { numero:2, tipo:"cozimento", ordem:2, volumeL:40, capacidadeL:120 },
    { numero:3, tipo:"cozimento", ordem:3, volumeL:30, capacidadeL:80  },
    { numero:4, tipo:"cozimento", ordem:4, volumeL:18, capacidadeL:80  },
    { numero:5, tipo:"daime",     grau:1,  volumeL:24, capacidadeL:60  },
    { numero:6, tipo:"daime",     grau:2,  volumeL:12, capacidadeL:60  },
    { numero:7, tipo:"agua_forte",         volumeL:8,  capacidadeL:40  },
  ],
  eventos: [
    { id:"e1", momento:new Date(2026,3,17,14,10), texto:"Panela 3 — Tirou 18 L (3º cozimento) → Tonel 3" },
    { id:"e2", momento:new Date(2026,3,17,13,30), texto:"Panela 1 — Acrescentou 3 L" },
    { id:"e3", momento:new Date(2026,3,17,11,20), texto:"Panela 2 — Tirou 30 L (3º cozimento) → Tonel 3" },
  ],
};

// ---- HOOKS ----
function useLiveNow() {
  const [now, setNow] = useState(new Date(NOW));
  useEffect(() => {
    const id = setInterval(() => setNow(d => new Date(d.getTime() + 1000)), 1000);
    return () => clearInterval(id);
  }, []);
  return now;
}

// ---- FMT ----
function fmtDuration(ms) {
  if (ms < 0) ms = 0;
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s/3600);
  const m = Math.floor((s%3600)/60);
  return `${String(h).padStart(2,'0')}h${String(m).padStart(2,'0')}`;
}
function fmtHora(d) {
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function tiragemLabel(t) {
  if (t.tipo === "cozimento") return `${t.grau}º cozimento`;
  if (t.tipo === "daime")     return `${t.grau}º grau`;
  if (t.tipo === "agua_forte")return "Água forte";
  return "—";
}
function conteudoLabel(c) {
  if (!c) return "—";
  if (c.tipo === "agua") return "Água";
  if (c.tipo === "cozimento") return `${c.ordem}º cozimento`;
  if (c.tipo === "agua_forte") return "Água forte";
  return "—";
}
function tonelLabel(t) {
  if (t.tipo === "cozimento") return `${t.ordem}º Cozimento`;
  if (t.tipo === "daime")     return `Daime ${t.grau}º grau`;
  if (t.tipo === "agua_forte")return "Água Forte";
  return "—";
}
function tiragemCor(t) {
  if (!t) return "var(--ink-soft)";
  if (t.tipo === "daime")     return "var(--daime)";
  if (t.tipo === "cozimento") return "var(--azul-profundo)";
  if (t.tipo === "agua_forte")return "var(--agua-forte)";
  return "var(--ink-soft)";
}
function tonelCor(t) {
  if (t.tipo === "daime")     return "var(--daime)";
  if (t.tipo === "agua_forte")return "var(--agua-forte)";
  return "var(--azul)";
}

// =========================================================
// HEADER — grid 3-col, muito respiro
// =========================================================
function Header({ feitio }) {
  const now = useLiveNow();
  const duracaoMs = now - feitio.inicio;

  return (
    <header style={{
      display: 'grid', gridTemplateColumns: 'auto 1fr auto',
      alignItems: 'center', gap: 40,
    }}>
      <div style={{
        width: 44, height: 44, borderRadius: '50%',
        border: '1px solid var(--azul-claro)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        color: 'var(--azul)', fontSize: 18, fontWeight: 300,
        background: 'rgba(255,255,255,0.6)',
      }}>✦</div>
      <div>
        <div className="mono" style={{
          fontSize: 10, letterSpacing: '0.35em',
          textTransform: 'uppercase', color: 'var(--ink-faint)',
        }}>
          Feitio · {feitio.casinha}
        </div>
        <h1 className="serif" style={{
          margin: '4px 0 0', fontSize: 30, fontWeight: 300,
          color: 'var(--ink)',
        }}>
          {feitio.nome}
        </h1>
      </div>
      <div style={{ textAlign: 'right' }}>
        <div className="serif" style={{
          fontSize: 42, fontWeight: 200, letterSpacing: '-0.02em',
          color: 'var(--ink)', lineHeight: 1,
        }}>
          {fmtHora(now)}
        </div>
        <div className="mono" style={{
          fontSize: 11, color: 'var(--ink-faint)',
          letterSpacing: '0.15em', marginTop: 4,
          textTransform: 'uppercase',
        }}>
          Dia 2 · {fmtDuration(duracaoMs)}
        </div>
      </div>
    </header>
  );
}

// =========================================================
// CRÉDITOS — linha horizontal com borda inferior
// =========================================================
function Creditos({ feitio, panelas, bocas, toneis }) {
  const noTonel = toneis.reduce((a,t) => a + t.volumeL, 0);
  return (
    <div style={{
      display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 40,
      paddingBottom: 24, borderBottom: '1px solid var(--linha)',
    }}>
      <Field label="Feitor" value={feitio.feitor} />
      <Field label="Foguista" value={feitio.foguista} />
      <Field label="Bocas ao fogo" value={`${panelas.length} / ${bocas}`} />
      <Field label="No tonel" value={`${noTonel} L`} highlight />
    </div>
  );
}

function Field({ label, value, highlight }) {
  return (
    <div>
      <div className="mono" style={{
        fontSize: 10, letterSpacing: '0.25em',
        textTransform: 'uppercase', color: 'var(--ink-faint)',
        marginBottom: 4,
      }}>{label}</div>
      <div className={highlight ? 'serif' : ''} style={{
        fontSize: highlight ? 26 : 18,
        fontWeight: highlight ? 300 : 400,
        color: highlight ? 'var(--azul-profundo)' : 'var(--ink)',
        letterSpacing: '-0.01em',
      }}>{value}</div>
    </div>
  );
}

// =========================================================
// FORNALHA — panelas em grid
// =========================================================
function Fornalha({ panelas, bocas, onPanelaClick, onEmptyClick }) {
  return (
    <section>
      <SectionHead title="Fornalha" subtitle="panelas no fogo" />
      <div style={{ display: 'grid', gridTemplateColumns: `repeat(${bocas}, 1fr)`, gap: 14 }}>
        {Array.from({length: bocas}, (_, i) => i+1).map(b => {
          const p = panelas.find(x => x.boca === b);
          return (
            <Panela key={b} boca={b} panela={p}
              onClick={() => p && onPanelaClick(p)}
              onClickEmpty={() => onEmptyClick(b)} />
          );
        })}
      </div>
    </section>
  );
}

function SectionHead({ title, subtitle }) {
  return (
    <div style={{ display: 'flex', alignItems: 'baseline', gap: 24, marginBottom: 24 }}>
      <h2 className="serif" style={{
        margin: 0, fontSize: 18, fontWeight: 400,
        letterSpacing: '0.01em', color: 'var(--ink)',
      }}>{title}</h2>
      <span className="mono" style={{
        fontSize: 11, color: 'var(--ink-faint)',
        letterSpacing: '0.15em', textTransform: 'uppercase',
      }}>{subtitle}</span>
    </div>
  );
}

function Panela({ boca, panela, onClick, onClickEmpty }) {
  if (!panela) {
    return (
      <button onClick={onClickEmpty} style={{
        minHeight: 200, borderRadius: 16,
        border: '1px dashed var(--linha)',
        background: 'var(--surface)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        flexDirection: 'column', gap: 8,
        color: 'var(--ink-faint)',
        transition: 'border-color 0.2s',
      }}
      onMouseEnter={(e) => e.currentTarget.style.borderColor = 'var(--azul-claro)'}
      onMouseLeave={(e) => e.currentTarget.style.borderColor = 'var(--linha)'}>
        <div className="mono" style={{ fontSize: 9, letterSpacing: '0.3em', textTransform: 'uppercase' }}>
          Boca {boca}
        </div>
        <div style={{
          width: 32, height: 32, borderRadius: '50%',
          border: '1px solid var(--linha)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 18, fontWeight: 200,
        }}>+</div>
      </button>
    );
  }

  const now = useLiveNow();
  const tempoMs = now - panela.entradaFogoEm;
  const volPct = Math.min(100, (panela.volumeAtualL / 120) * 100);
  const metaPct = Math.min(100, (panela.metaTiragem / 120) * 100);
  const cor = tiragemCor(panela.proxTiragem);

  return (
    <button onClick={onClick} style={{
      minHeight: 200,
      background: 'var(--surface)',
      border: '1px solid var(--linha)',
      borderRadius: 16,
      padding: '16px 14px 14px',
      display: 'flex', flexDirection: 'column',
      textAlign: 'left',
      boxShadow: '0 1px 2px rgba(40,60,90,0.04), 0 8px 24px rgba(40,60,90,0.03)',
      transition: 'border-color 0.2s, transform 0.2s',
    }}
    onMouseEnter={(e) => { e.currentTarget.style.borderColor = 'var(--linha-strong)'; e.currentTarget.style.transform = 'translateY(-1px)'; }}
    onMouseLeave={(e) => { e.currentTarget.style.borderColor = 'var(--linha)'; e.currentTarget.style.transform = 'translateY(0)'; }}>
      {/* topo */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 14 }}>
        <span className="mono" style={{
          fontSize: 9, letterSpacing: '0.28em',
          textTransform: 'uppercase', color: 'var(--ink-faint)',
        }}>Boca {boca}</span>
        <span className="mono" style={{
          fontSize: 11, color: 'var(--ink-soft)',
          fontVariantNumeric: 'tabular-nums',
        }}>{fmtDuration(tempoMs)}</span>
      </div>

      {/* número gigante */}
      <div className="serif" style={{
        fontSize: 64, lineHeight: 0.85, fontWeight: 200,
        color: 'var(--ink)', letterSpacing: '-0.04em',
        marginBottom: 10,
      }}>
        {String(panela.numero).padStart(2, '0')}
      </div>

      {/* próxima tiragem */}
      <div style={{ marginBottom: 14 }}>
        <div className="mono" style={{
          fontSize: 9, letterSpacing: '0.28em',
          textTransform: 'uppercase', color: 'var(--ink-faint)',
          marginBottom: 2,
        }}>vai tirar</div>
        <div style={{
          fontSize: 16, fontWeight: 500, color: cor,
          letterSpacing: '-0.01em', lineHeight: 1.15,
        }}>
          {tiragemLabel(panela.proxTiragem)}
        </div>
      </div>

      {/* volume — ring + número */}
      <div style={{ marginTop: 'auto', display: 'flex', alignItems: 'center', gap: 10 }}>
        <VolRing volPct={volPct} metaPct={metaPct} cor={cor} />
        <div>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 2 }}>
            <span style={{ fontSize: 20, fontWeight: 400, color: 'var(--ink)', letterSpacing: '-0.02em' }}>
              {panela.volumeAtualL}
            </span>
            <span className="mono" style={{ fontSize: 10, color: 'var(--ink-faint)' }}>L</span>
          </div>
          <div className="mono" style={{
            fontSize: 9, color: 'var(--ink-faint)',
            letterSpacing: '0.08em', textTransform: 'uppercase',
          }}>meta {panela.metaTiragem}</div>
        </div>
      </div>
    </button>
  );
}

function VolRing({ volPct, metaPct, cor }) {
  const r = 16;
  const c = 2 * Math.PI * r;
  const metaAngle = (metaPct / 100) * 360 - 90;
  const mx = 20 + r * Math.cos(metaAngle * Math.PI / 180);
  const my = 20 + r * Math.sin(metaAngle * Math.PI / 180);
  return (
    <svg width="40" height="40" viewBox="0 0 40 40" style={{ flexShrink: 0 }}>
      <circle cx="20" cy="20" r={r} fill="none" stroke="var(--linha)" strokeWidth="2" />
      <circle cx="20" cy="20" r={r} fill="none" stroke={cor} strokeWidth="2" strokeLinecap="round"
        strokeDasharray={`${(volPct/100) * c} ${c}`}
        transform="rotate(-90 20 20)" />
      <circle cx={mx} cy={my} r="2" fill="var(--ink)" />
    </svg>
  );
}

// =========================================================
// TONÉIS — grid horizontal, barra fina
// =========================================================
function Toneis({ toneis }) {
  return (
    <section>
      <SectionHead title="Tonéis" subtitle="colheita guardada" />
      <div style={{ display: 'grid', gridTemplateColumns: `repeat(${toneis.length}, 1fr)`, gap: 14 }}>
        {toneis.map(t => <Tonel key={t.numero} tonel={t} />)}
      </div>
    </section>
  );
}

function Tonel({ tonel }) {
  const pct = (tonel.volumeL / tonel.capacidadeL) * 100;
  const cor = tonelCor(tonel);
  return (
    <div style={{
      padding: 14, borderRadius: 14,
      background: 'var(--surface)',
      border: '1px solid var(--linha)',
      display: 'flex', flexDirection: 'column', gap: 10,
      minHeight: 130,
    }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
        <span className="mono" style={{
          fontSize: 9, letterSpacing: '0.25em',
          textTransform: 'uppercase', color: 'var(--ink-faint)',
        }}>T{tonel.numero}</span>
        <span className="serif" style={{
          fontSize: 20, fontWeight: 300, color: 'var(--ink)',
          letterSpacing: '-0.02em',
        }}>{tonel.volumeL}</span>
      </div>
      <div style={{
        fontSize: 12, fontWeight: 500, color: 'var(--ink)',
        letterSpacing: '-0.01em', lineHeight: 1.2,
      }}>
        {tonelLabel(tonel)}
      </div>
      <div style={{ marginTop: 'auto' }}>
        <div style={{ height: 3, background: 'var(--linha)', borderRadius: 2 }}>
          <div style={{ height: '100%', width: `${pct}%`, background: cor, borderRadius: 2 }} />
        </div>
        <div className="mono" style={{
          fontSize: 9, color: 'var(--ink-faint)',
          marginTop: 4, letterSpacing: '0.08em', textTransform: 'uppercase',
        }}>
          {Math.round(pct)}% · {tonel.capacidadeL} L
        </div>
      </div>
    </div>
  );
}

// =========================================================
// FOOTER — último evento + ações
// =========================================================
function Footer({ ultimoEvento, onNova, onUndo }) {
  return (
    <footer style={{
      marginTop: 'auto', paddingTop: 24,
      borderTop: '1px solid var(--linha)',
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
    }}>
      <div style={{ fontSize: 12, color: 'var(--ink-soft)' }}>
        <span className="mono" style={{
          color: 'var(--ink-faint)', marginRight: 12,
          letterSpacing: '0.15em', textTransform: 'uppercase', fontSize: 10,
        }}>último</span>
        {ultimoEvento.texto}
        <span className="mono" style={{
          color: 'var(--ink-faint)', marginLeft: 12,
        }}>{fmtHora(ultimoEvento.momento)}</span>
      </div>
      <div style={{ display: 'flex', gap: 12 }}>
        <button onClick={onUndo} style={{
          padding: '10px 20px', background: 'transparent',
          color: 'var(--ink-soft)',
          border: '1px solid var(--linha)', borderRadius: 999,
          fontSize: 13, fontWeight: 400,
        }}>Desfazer</button>
        <button onClick={onNova} style={{
          padding: '10px 24px',
          background: 'var(--azul-profundo)', color: '#fff',
          borderRadius: 999,
          fontSize: 13, fontWeight: 500, letterSpacing: '0.02em',
        }}>Nova panela</button>
      </div>
    </footer>
  );
}

// =========================================================
// MODAL DE DETALHE DA PANELA
// =========================================================
function PanelaModal({ panela, onClose }) {
  if (!panela) return null;
  const now = useLiveNow();
  const tempoMs = now - panela.entradaFogoEm;
  const cor = tiragemCor(panela.proxTiragem);

  return (
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0,
      background: 'rgba(28,32,36,0.22)',
      backdropFilter: 'blur(8px)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      zIndex: 50, padding: 24,
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        width: '100%', maxWidth: 640,
        background: 'var(--surface)',
        border: '1px solid var(--linha)',
        borderRadius: 18,
        boxShadow: '0 24px 60px rgba(40,60,90,0.18)',
        overflow: 'hidden',
      }}>
        {/* Header */}
        <div style={{
          padding: '28px 32px 24px',
          borderBottom: '1px solid var(--linha)',
          display: 'flex', alignItems: 'baseline', justifyContent: 'space-between',
        }}>
          <div>
            <div className="mono" style={{
              fontSize: 10, letterSpacing: '0.3em',
              textTransform: 'uppercase', color: 'var(--ink-faint)',
            }}>Boca {panela.boca}</div>
            <div className="serif" style={{
              fontSize: 56, lineHeight: 0.9, fontWeight: 200,
              letterSpacing: '-0.04em', marginTop: 6,
            }}>
              Panela {String(panela.numero).padStart(2,'0')}
            </div>
            <div style={{ marginTop: 10, fontSize: 13, color: 'var(--ink-soft)' }}>
              com <span style={{ color: 'var(--ink)' }}>{conteudoLabel(panela.conteudo).toLowerCase()}</span>
              <span style={{ color: 'var(--ink-faint)', margin: '0 8px' }}>·</span>
              há <span className="mono" style={{ color: 'var(--ink)' }}>{fmtDuration(tempoMs)}</span> no fogo
            </div>
          </div>
          <button onClick={onClose} style={{
            width: 32, height: 32, borderRadius: '50%',
            border: '1px solid var(--linha)',
            color: 'var(--ink-soft)', fontSize: 16,
          }}>×</button>
        </div>

        {/* Próxima tiragem + volume */}
        <div style={{
          display: 'grid', gridTemplateColumns: '1fr 1fr',
          borderBottom: '1px solid var(--linha)',
        }}>
          <div style={{ padding: '24px 32px' }}>
            <div className="mono" style={{
              fontSize: 10, letterSpacing: '0.28em',
              textTransform: 'uppercase', color: 'var(--ink-faint)',
              marginBottom: 6,
            }}>vai tirar</div>
            <div className="serif" style={{
              fontSize: 26, fontWeight: 300, color: cor,
              letterSpacing: '-0.02em',
            }}>
              {tiragemLabel(panela.proxTiragem)}
            </div>
          </div>
          <div style={{ padding: '24px 32px', borderLeft: '1px solid var(--linha)' }}>
            <div className="mono" style={{
              fontSize: 10, letterSpacing: '0.28em',
              textTransform: 'uppercase', color: 'var(--ink-faint)',
              marginBottom: 6,
            }}>volume · meta</div>
            <div style={{ display: 'flex', alignItems: 'baseline', gap: 6 }}>
              <span className="serif" style={{ fontSize: 26, fontWeight: 300, color: 'var(--ink)' }}>
                {panela.volumeAtualL}
              </span>
              <span className="mono" style={{ fontSize: 12, color: 'var(--ink-faint)' }}>L</span>
              <span style={{ color: 'var(--ink-faint)', margin: '0 6px' }}>/</span>
              <span style={{ fontSize: 16, color: 'var(--ink-soft)' }}>{panela.metaTiragem} L</span>
            </div>
          </div>
        </div>

        {/* Tiragens anteriores */}
        <div style={{ padding: '24px 32px' }}>
          <div className="mono" style={{
            fontSize: 10, letterSpacing: '0.28em',
            textTransform: 'uppercase', color: 'var(--ink-faint)',
            marginBottom: 14,
          }}>tiragens anteriores · {panela.tiragens.length}</div>
          {panela.tiragens.length === 0 ? (
            <div style={{
              fontSize: 13, color: 'var(--ink-faint)',
              fontStyle: 'italic', padding: '12px 0',
            }}>
              Primeira tiragem ainda não foi feita.
            </div>
          ) : (
            <div style={{ display: 'flex', flexDirection: 'column' }}>
              {panela.tiragens.map((t, i) => (
                <div key={i} style={{
                  display: 'grid',
                  gridTemplateColumns: '32px 1fr auto auto',
                  gap: 16, alignItems: 'baseline',
                  padding: '12px 0',
                  borderTop: i === 0 ? 'none' : '1px solid var(--linha)',
                }}>
                  <span className="mono" style={{ fontSize: 11, color: 'var(--ink-faint)' }}>{t.ordem}ª</span>
                  <span style={{ fontSize: 14, color: 'var(--ink)' }}>{tiragemLabel(t)}</span>
                  <span>
                    <span className="serif" style={{ fontSize: 18 }}>{t.volume}</span>
                    <span className="mono" style={{ fontSize: 10, color: 'var(--ink-faint)', marginLeft: 2 }}>L</span>
                  </span>
                  <span className="mono" style={{ fontSize: 11, color: 'var(--ink-faint)' }}>{fmtHora(t.momento)}</span>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Ações */}
        <div style={{
          padding: '20px 32px',
          borderTop: '1px solid var(--linha)',
          display: 'flex', gap: 12, alignItems: 'center',
        }}>
          <ModalPrimaryBtn accent={cor}>Tirar — {tiragemLabel(panela.proxTiragem).toLowerCase()}</ModalPrimaryBtn>
          <ModalGhostBtn>Repor</ModalGhostBtn>
          <ModalGhostBtn>Pausar</ModalGhostBtn>
          <div style={{ flex: 1 }} />
          <button style={{
            fontSize: 12, color: 'var(--ink-faint)',
            textDecoration: 'underline', textUnderlineOffset: 3,
          }}>histórico completo</button>
        </div>
      </div>
    </div>
  );
}

function ModalPrimaryBtn({ children, accent }) {
  return (
    <button style={{
      padding: '11px 22px', borderRadius: 999,
      background: accent, color: '#fff',
      fontSize: 13, fontWeight: 500, letterSpacing: '0.01em',
    }}>{children}</button>
  );
}
function ModalGhostBtn({ children }) {
  return (
    <button style={{
      padding: '11px 18px', borderRadius: 999,
      background: 'transparent', color: 'var(--ink-soft)',
      border: '1px solid var(--linha)',
      fontSize: 13, fontWeight: 400,
    }}>{children}</button>
  );
}

// =========================================================
// NOVA PANELA — modal mínimo
// =========================================================
function NovaPanelaModal({ onClose, bocasVazias }) {
  const [qtd, setQtd] = useState(bocasVazias.length >= 2 ? 2 : 1);
  const [conteudo, setConteudo] = useState('agua');
  const [volume, setVolume] = useState(60);
  return (
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0,
      background: 'rgba(28,32,36,0.22)', backdropFilter: 'blur(8px)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      zIndex: 50, padding: 24,
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        width: '100%', maxWidth: 560,
        background: 'var(--surface)', borderRadius: 18,
        border: '1px solid var(--linha)',
        boxShadow: '0 24px 60px rgba(40,60,90,0.18)',
        overflow: 'hidden',
      }}>
        <div style={{ padding: '28px 32px 20px', borderBottom: '1px solid var(--linha)' }}>
          <div className="mono" style={{ fontSize: 10, color: 'var(--ink-faint)', letterSpacing: '0.3em', textTransform: 'uppercase' }}>criar</div>
          <div className="serif" style={{ fontSize: 32, fontWeight: 200, letterSpacing: '-0.03em', marginTop: 6 }}>
            Nova panela na fornalha
          </div>
          <div style={{ fontSize: 12, color: 'var(--ink-faint)', marginTop: 8 }}>
            {bocasVazias.length} boca{bocasVazias.length !== 1 ? 's' : ''} livre{bocasVazias.length !== 1 ? 's' : ''}: {bocasVazias.join(', ')}
          </div>
        </div>
        <div style={{ padding: '24px 32px', display: 'flex', flexDirection: 'column', gap: 24 }}>
          <FieldGroup label="quantas">
            <PillRow>
              <Pill active={qtd===1} onClick={() => setQtd(1)}>1 panela</Pill>
              {bocasVazias.length >= 2 && <Pill active={qtd===2} onClick={() => setQtd(2)}>Dupla (2)</Pill>}
            </PillRow>
          </FieldGroup>
          <FieldGroup label="entra com">
            <PillRow>
              <Pill active={conteudo==='agua'} onClick={() => setConteudo('agua')}>Água</Pill>
              <Pill active={conteudo==='coz1'} onClick={() => setConteudo('coz1')}>1º coz. · 52 L</Pill>
              <Pill active={conteudo==='coz2'} onClick={() => setConteudo('coz2')}>2º coz. · 40 L</Pill>
            </PillRow>
          </FieldGroup>
          <FieldGroup label="volume cada">
            <div style={{ display: 'flex', alignItems: 'baseline', gap: 6, marginBottom: 10 }}>
              <span className="serif" style={{ fontSize: 48, fontWeight: 200, letterSpacing: '-0.03em' }}>{volume}</span>
              <span className="mono" style={{ fontSize: 12, color: 'var(--ink-faint)' }}>L</span>
            </div>
            <PillRow>
              {[50, 55, 60, 65].map(v => <Pill key={v} active={volume===v} onClick={() => setVolume(v)}>{v} L</Pill>)}
            </PillRow>
          </FieldGroup>
        </div>
        <div style={{
          padding: '20px 32px', borderTop: '1px solid var(--linha)',
          display: 'flex', justifyContent: 'space-between', gap: 12,
        }}>
          <ModalGhostBtn><span onClick={onClose} style={{ display: 'block', margin: '-11px -18px', padding: '11px 18px' }}>Cancelar</span></ModalGhostBtn>
          <button onClick={onClose} style={{
            padding: '11px 26px', borderRadius: 999,
            background: 'var(--azul-profundo)', color: '#fff',
            fontSize: 13, fontWeight: 500, letterSpacing: '0.01em',
          }}>Entrar no fogo</button>
        </div>
      </div>
    </div>
  );
}

function FieldGroup({ label, children }) {
  return (
    <div>
      <div className="mono" style={{
        fontSize: 10, color: 'var(--ink-faint)',
        letterSpacing: '0.28em', textTransform: 'uppercase',
        marginBottom: 10,
      }}>{label}</div>
      {children}
    </div>
  );
}
function PillRow({ children }) {
  return <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>{children}</div>;
}
function Pill({ active, onClick, children }) {
  return (
    <button onClick={onClick} style={{
      padding: '9px 16px', borderRadius: 999,
      border: active ? '1px solid var(--azul)' : '1px solid var(--linha)',
      background: active ? 'rgba(107,140,184,0.08)' : 'transparent',
      color: active ? 'var(--azul-profundo)' : 'var(--ink-soft)',
      fontSize: 13, fontWeight: 400,
      transition: 'all 0.15s',
    }}>{children}</button>
  );
}

// =========================================================
// TWEAKS
// =========================================================
function TweaksPanel({ tweaks, setTweaks, onClose }) {
  const update = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*'); } catch {}
  };
  return (
    <div style={{
      position: 'fixed', right: 24, bottom: 24,
      width: 300, zIndex: 100,
      background: 'var(--surface)',
      border: '1px solid var(--linha)',
      borderRadius: 16,
      boxShadow: '0 24px 60px rgba(40,60,90,0.18)',
      overflow: 'hidden',
    }}>
      <div style={{
        padding: '14px 18px', borderBottom: '1px solid var(--linha)',
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
      }}>
        <div className="serif" style={{ fontSize: 18, fontWeight: 300 }}>Tweaks</div>
        <button onClick={onClose} style={{ color: 'var(--ink-faint)', fontSize: 18 }}>×</button>
      </div>
      <div style={{ padding: 18, display: 'flex', flexDirection: 'column', gap: 18 }}>
        <TweakField label="Paleta">
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            {Object.entries(PALETAS).map(([k, p]) => {
              const active = tweaks.palette === k;
              return (
                <button key={k} onClick={() => update('palette', k)} style={{
                  display: 'flex', alignItems: 'center', gap: 12,
                  padding: '10px 12px', borderRadius: 10,
                  border: active ? '1px solid ' + p.azul : '1px solid var(--linha)',
                  background: active ? 'rgba(107,140,184,0.05)' : 'transparent',
                  textAlign: 'left',
                }}>
                  <div style={{ display: 'flex', gap: 3 }}>
                    <span style={{ width: 12, height: 20, borderRadius: 2, background: p.azulProfundo }} />
                    <span style={{ width: 12, height: 20, borderRadius: 2, background: p.azul }} />
                    <span style={{ width: 12, height: 20, borderRadius: 2, background: p.azulClaro }} />
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div className="serif" style={{ fontSize: 14, fontWeight: 400, color: 'var(--ink)' }}>{p.nome}</div>
                    <div style={{ fontSize: 10.5, color: 'var(--ink-faint)', marginTop: 1 }}>{p.sub}</div>
                  </div>
                  {active && <span className="mono" style={{ fontSize: 9, color: p.azulProfundo, letterSpacing: '0.15em' }}>ATIVA</span>}
                </button>
              );
            })}
          </div>
        </TweakField>
        <TweakField label="Linha de créditos">
          <Toggle checked={tweaks.showCreditos} onChange={(v) => update('showCreditos', v)} />
        </TweakField>
        <TweakField label="Rodapé">
          <Toggle checked={tweaks.showFooter} onChange={(v) => update('showFooter', v)} />
        </TweakField>
      </div>
    </div>
  );
}

function TweakField({ label, children }) {
  return (
    <div>
      <div className="mono" style={{
        fontSize: 10, color: 'var(--ink-faint)',
        letterSpacing: '0.25em', textTransform: 'uppercase',
        marginBottom: 8,
      }}>{label}</div>
      {children}
    </div>
  );
}
function Toggle({ checked, onChange }) {
  return (
    <button onClick={() => onChange(!checked)} style={{
      width: 40, height: 22, borderRadius: 11,
      background: checked ? 'var(--azul-profundo)' : 'var(--linha-strong)',
      position: 'relative', transition: 'all 0.2s',
    }}>
      <span style={{
        position: 'absolute', top: 2, left: checked ? 20 : 2,
        width: 18, height: 18, borderRadius: '50%',
        background: '#fff', transition: 'left 0.2s',
        boxShadow: '0 1px 2px rgba(0,0,0,0.1)',
      }} />
    </button>
  );
}

// =========================================================
// APP
// =========================================================
function App() {
  const [state, setState] = useState(initialState);
  const [selected, setSelected] = useState(null);
  const [novaOpen, setNovaOpen] = useState(false);
  const [tweaks, setTweaks] = useState(TWEAKS);
  const [tweaksOpen, setTweaksOpen] = useState(false);

  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch {}
    return () => window.removeEventListener('message', handler);
  }, []);

  // aplicar paleta
  useEffect(() => {
    const p = PALETAS[tweaks.palette] || PALETAS["luz-branca"];
    const s = document.documentElement.style;
    s.setProperty('--azul', p.azul);
    s.setProperty('--azul-claro', p.azulClaro);
    s.setProperty('--azul-profundo', p.azulProfundo);
    s.setProperty('--aura-top', p.auraTop);
    s.setProperty('--aura-bottom', p.auraBottom);
  }, [tweaks.palette]);

  const bocasOcupadas = state.panelas.map(p => p.boca);
  const bocasVazias = Array.from({length: state.fornalha.bocas}, (_, i) => i+1)
    .filter(b => !bocasOcupadas.includes(b));

  return (
    <div className="app-shell">
      <Header feitio={state.feitio} />
      {tweaks.showCreditos && (
        <Creditos feitio={state.feitio} panelas={state.panelas}
          bocas={state.fornalha.bocas} toneis={state.toneis} />
      )}
      <Fornalha
        panelas={state.panelas}
        bocas={state.fornalha.bocas}
        onPanelaClick={setSelected}
        onEmptyClick={() => setNovaOpen(true)} />
      <Toneis toneis={state.toneis} />

      {tweaks.showFooter && (
        <Footer
          ultimoEvento={state.eventos[0]}
          onNova={() => setNovaOpen(true)}
          onUndo={() => {}} />
      )}

      {selected && <PanelaModal panela={selected} onClose={() => setSelected(null)} />}
      {novaOpen && <NovaPanelaModal onClose={() => setNovaOpen(false)} bocasVazias={bocasVazias} />}
      {tweaksOpen && <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} onClose={() => setTweaksOpen(false)} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
