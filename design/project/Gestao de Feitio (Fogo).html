// Cenário: Feitio de Abril/2026, Sexta-feira, 14:32

const initialState = {

        { ordem: 2, tipo: "cozimento", grau: 2, volume: 30, momento: new Date(2026, 3, 16, 14, 40) },

      tiragens: [
        { ordem: 1, tipo: "cozimento", grau: 1, volume: 30, momento: new Date(2026, 3, 16, 10, 20) },
        { ordem: 2, tipo: "cozimento", grau: 2, volume: 30, momento: new Date(2026, 3, 16, 14, 45) },

    { id: "e2", tipo: "volume_ajustado", momento: new Date(2026, 3, 17, 13, 30), texto: "Panela 1 — Acrescentou 3 L" },

// Hooks
function useTick(ms = 1000) {
  const [, setT] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setT(x => x + 1), ms);
    return () => clearInterval(id);
  }, [ms]);
}
function fmtDuration(ms) {
  if (ms < 0) ms = 0;
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}
function fmtHora(d) {
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// Domain labels
function conteudoLabel(c) {
  if (!c) return "—";
  if (c.tipo === "agua") return "Água";
  if (c.tipo === "cozimento") return `${c.ordem}º cozimento`;
  if (c.tipo === "agua_forte") return "Água forte";
  return "—";
}
function tiragemLabel(t) {
  if (t.tipo === "cozimento") return `${t.grau}º cozimento`;
  if (t.tipo === "daime") return `${t.grau}º grau`;
  if (t.tipo === "agua_forte") return "Água forte";
  return "—";
}
function tiragemShort(t) {
  if (t.tipo === "cozimento") return `${t.grau}ºC`;
  if (t.tipo === "daime") return `${t.grau}ºG`;
  if (t.tipo === "agua_forte") return "AF";
  return "—";
}
function tonelLabel(t) {
  if (t.tipo === "cozimento") return `${t.ordem}º Cozimento`;
  if (t.tipo === "daime") return `Daime ${t.grau}º grau`;
  if (t.tipo === "agua_forte") return "Água Forte";
  if (t.tipo === "apuracao") return "Apuração";
  if (t.tipo === "mel_dagua") return "Mel d'Água";
  return "—";
}
function tonelColor(t) {
  if (t.tipo === "cozimento") return "var(--cozimento)";
  if (t.tipo === "daime") return "var(--daime)";
  if (t.tipo === "agua_forte") return "var(--agua-forte)";
  return "var(--border)";
}
function conteudoColor(c) {
  if (!c) return "var(--border)";
  if (c.tipo === "agua") return "var(--agua)";
  if (c.tipo === "cozimento") return "var(--cozimento)";
  if (c.tipo === "agua_forte") return "var(--agua-forte)";
  return "var(--border)";
}
function proxTiragemColor(p) {
  if (!p) return "var(--text-dim)";
  if (p.tipo === "cozimento") return "var(--cozimento-2)";
  if (p.tipo === "daime") return "var(--daime-2)";
  if (p.tipo === "agua_forte") return "var(--agua-forte)";
  return "var(--text-dim)";
}

// ==== TOP BAR ==========================================
function TopBar({ feitio }) {
  useTick(1000);
  const [now, setNow] = useState(NOW);
  useEffect(() => {
    const id = setInterval(() => setNow(d => new Date(d.getTime() + 1000)), 1000);
    return () => clearInterval(id);
  }, []);

  const duracaoMs = now - feitio.inicio;
  const h = Math.floor(duracaoMs / 3600000);

  return (
    <header style={{
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      padding: '18px 32px',
      borderBottom: '1px solid var(--border-soft)',
      background: 'linear-gradient(180deg, var(--fire-soft-04), transparent)',
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 20 }}>
        <div style={{
          width: 44, height: 44, borderRadius: '50%',
          background: 'radial-gradient(circle at 40% 40%, var(--fire-glow), var(--fire) 55%, #6b2a0f)',
          boxShadow: '0 0 24px var(--fire-glow-soft-35), inset 0 -4px 8px rgba(0,0,0,0.3)',
          position: 'relative',
        }}>
          <div style={{
            position: 'absolute', inset: 10, borderRadius: '50%',
            background: 'radial-gradient(circle, var(--ember), transparent 70%)',
            filter: 'blur(2px)',
          }} />
        </div>
        <div>
          <div className="serif" style={{ fontSize: 28, lineHeight: 1, color: 'var(--text)' }}>
            {feitio.nome}
          </div>
          <div style={{ fontSize: 13, color: 'var(--text-faint)', marginTop: 4, display: 'flex', gap: 14 }}>
            <span>Feitor: <span style={{ color: 'var(--text-dim)' }}>{feitio.feitor}</span></span>
            <span style={{ opacity: 0.4 }}>·</span>
            <span>Foguista: <span style={{ color: 'var(--text-dim)' }}>{feitio.foguista}</span></span>
            <span style={{ opacity: 0.4 }}>·</span>
            <span>{feitio.casinha}</span>
          </div>
        </div>
      </div>

      <div style={{ display: 'flex', alignItems: 'center', gap: 24 }}>
        <StatusPill status={feitio.status} dayLabel={`Dia 2 · ${h}h em andamento`} />
        <div style={{ textAlign: 'right' }}>
          <div className="serif" style={{ fontSize: 36, lineHeight: 1, letterSpacing: '-0.02em' }}>
            {String(now.getHours()).padStart(2,'0')}:{String(now.getMinutes()).padStart(2,'0')}
          </div>
          <div className="mono" style={{ fontSize: 11, color: 'var(--text-faint)', marginTop: 4, textTransform: 'uppercase', letterSpacing: '0.1em' }}>
            sex · 17 abr
          </div>
        </div>
      </div>
    </header>
  );
}
function StatusPill({ status, dayLabel }) {
  return (
    <div style={{
      display: 'inline-flex', alignItems: 'center', gap: 10,
      padding: '8px 16px', borderRadius: 999,
      background: 'rgba(107,142,78,0.12)',
      border: '1px solid rgba(107,142,78,0.35)',
      fontSize: 12, color: 'var(--text-dim)',
      textTransform: 'uppercase', letterSpacing: '0.08em',
    }}>
      <span style={{
        width: 8, height: 8, borderRadius: '50%',
        background: 'var(--success)',
        boxShadow: '0 0 8px var(--success)',

      }} />
      <span>Em andamento</span>
      <span style={{ opacity: 0.4 }}>·</span>
      <span style={{ textTransform: 'none', letterSpacing: 0 }}>{dayLabel}</span>
    </div>
  );
}

// ==== BOCA / PANELA CARD ===============================
function BocaCard({ boca, panela, onClick, onClickEmpty, selected, onLongSelect }) {
  const hasPanela = !!panela;
  if (!hasPanela) {
    return (
      <button
        onClick={onClickEmpty}
        style={{
          position: 'relative',
          minHeight: 240,
          padding: 20,
          background: 'var(--surface)',
          border: '1.5px dashed var(--border)',
          borderRadius: 16,
          display: 'flex', flexDirection: 'column',
          alignItems: 'center', justifyContent: 'center',
          gap: 14,
          transition: 'all 0.2s',
          color: 'var(--text-faint)',
        }}
        onMouseEnter={(e) => { e.currentTarget.style.borderColor = 'var(--fire)'; e.currentTarget.style.background = 'var(--bg-3)'; }}
        onMouseLeave={(e) => { e.currentTarget.style.borderColor = 'var(--border)'; e.currentTarget.style.background = 'var(--surface)'; }}
      >
        <div className="mono" style={{ fontSize: 11, letterSpacing: '0.15em', opacity: 0.6 }}>BOCA {boca}</div>
        <div style={{
          width: 56, height: 56, borderRadius: '50%',
          border: '1.5px dashed var(--border)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 24, color: 'var(--text-faint)',
        }}>+</div>
        <div style={{ fontSize: 13, color: 'var(--text-dim)' }}>Nova panela</div>
      </button>
    );
  }
  return <PanelaCard boca={boca} panela={panela} onClick={onClick} selected={selected} />;
}

function PanelaCard({ boca, panela, onClick, selected }) {
  useTick(1000);
  const [now, setNow] = useState(new Date(NOW));
  useEffect(() => {
    const id = setInterval(() => setNow(d => new Date(d.getTime() + 1000)), 1000);
    return () => clearInterval(id);
  }, []);

  const tempoMs = now - panela.entradaFogoEm;
  const volPct = Math.min(100, Math.max(0, (panela.volumeAtualL / 120) * 100));
  const metaPct = (panela.metaTiragem / panela.volumeAtualL) * 100;
  const rumoMeta = panela.volumeAtualL - panela.metaTiragem; // quanto precisa evaporar

  const accent = conteudoColor(panela.conteudo);
  const proxAccent = proxTiragemColor(panela.proxTiragem);

  return (
    <button
      onClick={onClick}
      style={{
        position: 'relative',
        minHeight: 240,
        padding: 0,
        background: 'var(--surface)',
        border: selected ? '2px solid var(--ember)' : '1px solid var(--border-soft)',
        borderRadius: 16,
        textAlign: 'left',
        overflow: 'hidden',
        transition: 'all 0.2s',
        boxShadow: selected ? '0 0 0 4px var(--ember-soft-15)' : '0 1px 2px rgba(0,0,0,0.3)',
      }}
      onMouseEnter={(e) => { if (!selected) e.currentTarget.style.borderColor = 'var(--border)'; }}
      onMouseLeave={(e) => { if (!selected) e.currentTarget.style.borderColor = 'var(--border-soft)'; }}
    >
      {/* Fire glow behind */}
      <div style={{
        position: 'absolute', bottom: -40, left: '50%', transform: 'translateX(-50%)',
        width: '80%', height: 80,
        background: 'radial-gradient(ellipse, var(--fire-soft-25), transparent 70%)',
        filter: 'blur(8px)',
        pointerEvents: 'none',
      }} />

      {/* Top bar: boca + timer */}
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '10px 16px',
        borderBottom: '1px solid var(--border-soft)',
        background: `linear-gradient(90deg, ${proxAccent}22, transparent)`,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <div style={{
            width: 8, height: 8, borderRadius: '50%',
            background: 'var(--fire)', boxShadow: '0 0 8px var(--fire-glow)',
            animation: 'flicker 2.5s ease-in-out infinite',
          }} />
          <span className="mono" style={{ fontSize: 10, letterSpacing: '0.15em', color: 'var(--text-faint)' }}>
            BOCA {boca} · PANELA {panela.numero}
          </span>
        </div>
        <span className="mono" style={{ fontSize: 15, fontWeight: 500, color: 'var(--ember)', letterSpacing: '-0.02em' }}>
          {fmtDuration(tempoMs)}
        </span>
      </div>

      {/* Main body — name of pan = next yield */}
      <div style={{ padding: '16px 18px 14px' }}>
        <div style={{ marginBottom: 14 }}>
          <div className="mono" style={{ fontSize: 9, color: 'var(--text-faint)', letterSpacing: '0.14em', textTransform: 'uppercase' }}>
            vai tirar
          </div>
          <div className="serif" style={{
            fontSize: 40, lineHeight: 1.02, letterSpacing: '-0.02em',
            color: proxAccent, marginTop: 2,
          }}>
            {tiragemLabel(panela.proxTiragem)}
          </div>
          <div style={{ fontSize: 11, color: 'var(--text-faint)', marginTop: 6, display: 'flex', alignItems: 'center', gap: 6 }}>
            <span style={{ width: 8, height: 8, borderRadius: 2, background: accent, display: 'inline-block' }} />
            <span>cozinhando com <span style={{ color: 'var(--text-dim)' }}>{conteudoLabel(panela.conteudo).toLowerCase()}</span></span>
          </div>
        </div>

        {/* Volume bar */}
        <div style={{ marginBottom: 10 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 6 }}>
            <span style={{ fontSize: 11, color: 'var(--text-faint)' }}>Volume atual</span>
            <span>
              <span className="serif" style={{ fontSize: 22, color: 'var(--text)' }}>{panela.volumeAtualL}</span>

function VolumeBar({ volumeL, metaL, accent }) {
  const capacidade = 120;
  const pctAtual = (volumeL / capacidade) * 100;
  const pctMeta = (metaL / capacidade) * 100;
  return (
    <div style={{
      position: 'relative', height: 10,
      background: 'rgba(0,0,0,0.35)',
      borderRadius: 5,
      overflow: 'hidden',
      border: '1px solid var(--border-soft)',
    }}>
      <div style={{
        position: 'absolute', left: 0, top: 0, bottom: 0,
        width: `${pctAtual}%`,
        background: `linear-gradient(90deg, ${accent}, ${accent}dd)`,
        transition: 'width 0.4s',
      }} />
      {/* Meta marker */}
      <div style={{
        position: 'absolute', left: `${pctMeta}%`, top: -2, bottom: -2,
        width: 2, background: 'var(--ember)',

}

function Fornalha({ panelas, bocas, onBocaClick, onEmptyClick, selectedIds, tweaks }) {

  const panelaByBoca = (b) => panelas.find(p => p.boca === b);
  const isSimples = tweaks?.layout === 'grade-simples';
  const compact = !!tweaks?.compactMode;
  return (
    <div style={{
      position: 'relative',
      padding: compact ? '16px 20px' : '24px 28px',
    }}>
      {/* Fornalha label */}
      <div style={{
        display: 'flex', alignItems: 'baseline', justifyContent: 'space-between',
        marginBottom: compact ? 10 : 16,
      }}>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 14 }}>
          <h2 className="serif" style={{ margin: 0, fontSize: compact ? 20 : 24, letterSpacing: '-0.01em' }}>Fornalha</h2>
          <span className="mono" style={{ fontSize: 11, color: 'var(--text-faint)', letterSpacing: '0.1em', textTransform: 'uppercase' }}>
            {panelas.length} de {bocas} bocas ocupadas
          </span>
        </div>
        <FornalhaLegenda />
      </div>

        <div className={compact ? 'fornalha-compact' : ''} style={{
          display: 'grid',
          gridTemplateColumns: `repeat(${Math.min(bocas, 3)}, 1fr)`,
          gap: compact ? 10 : 16,
        }}>
          {bocasArr.map(b => (
            <BocaCard
              key={b} boca={b}
              panela={panelaByBoca(b)}
              onClick={() => onBocaClick(panelaByBoca(b))}
              onClickEmpty={() => onEmptyClick(b)}
              selected={selectedIds.includes(panelaByBoca(b)?.id)}
            />
          ))}
        </div>
      ) : (
        <div className={compact ? 'fornalha-compact' : ''}>
          <div style={{
            display: 'grid',
            gridTemplateColumns: 'repeat(3, 1fr)',
            gap: compact ? 10 : 16,

                  compact={compact}
                />
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function PanelaDetailModal({ panela, onClose, onTirar, onRepor }) {
  if (!panela) return null;
  const [view, setView] = useState("detail"); // detail | tirar | repor
  useTick(1000);
  const [now, setNow] = useState(new Date(NOW));
  useEffect(() => {
    const id = setInterval(() => setNow(d => new Date(d.getTime() + 1000)), 1000);
    return () => clearInterval(id);
  }, []);
  const tempoMs = now - panela.entradaFogoEm;
  const accent = conteudoColor(panela.conteudo);
  const proxAccent = proxTiragemColor(panela.proxTiragem);

  return (
    <div style={{
      position: 'fixed', inset: 0,
      background: 'rgba(12,9,6,0.75)', backdropFilter: 'blur(6px)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      zIndex: 50, padding: 20,
    }} onClick={onClose}>
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          width: '100%', maxWidth: 720,
          background: 'var(--bg-2)',
          border: '1px solid var(--border)',
          borderRadius: 16,
          overflow: 'hidden',
          boxShadow: '0 20px 60px rgba(0,0,0,0.6)',
        }}
      >
        {view === "detail" && <PanelaDetailBody panela={panela} accent={accent} proxAccent={proxAccent} tempoMs={tempoMs}
          onClose={onClose} onTirar={() => setView("tirar")} onRepor={() => setView("repor")} />}
        {view === "tirar" && <TirarForm panela={panela} onCancel={() => setView("detail")} onConfirm={() => { onTirar(); onClose(); }} />}
        {view === "repor" && <ReporForm panela={panela} onCancel={() => setView("detail")} onConfirm={() => { onRepor(); onClose(); }} />}

    </div>
  );
}

// ==== TWEAKS PANEL ======================================
function TweaksPanel({ tweaks, setTweaks, onClose }) {
  const update = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    try {
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
    } catch {}
  };
  return (
    <div style={{
      position: 'fixed', right: 20, bottom: 20,
      width: 300, zIndex: 100,
      background: 'var(--bg-2)', border: '1px solid var(--border)',
      borderRadius: 14, overflow: 'hidden',
      boxShadow: '0 20px 40px rgba(0,0,0,0.5)',
    }}>
      <div style={{ padding: '12px 16px', borderBottom: '1px solid var(--border-soft)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <div className="serif" style={{ fontSize: 18 }}>Tweaks</div>
        <button onClick={onClose} style={{ color: 'var(--text-faint)', fontSize: 18 }}>×</button>
      </div>
      <div style={{ padding: 16, display: 'flex', flexDirection: 'column', gap: 16, fontSize: 13, maxHeight: '80vh', overflowY: 'auto' }}>
        <Tweak label="Layout das bocas">
          <SegmentedCtrl value={tweaks.layout} onChange={(v) => update('layout', v)} options={[
            { v: 'fornalha-visual', l: 'Visual' },
            { v: 'grade-simples', l: 'Grade' },
          ]} />
        </Tweak>
        <Tweak label="Modo compacto">
          <Toggle checked={tweaks.compactMode} onChange={(v) => update('compactMode', v)} />
        </Tweak>
        <Tweak label="Mostrar timeline">
          <Toggle checked={tweaks.showTimeline} onChange={(v) => update('showTimeline', v)} />
        </Tweak>
        <Tweak label="Paleta de cores">
          <PaletaPicker value={tweaks.palette} onChange={(v) => update('palette', v)} />
        </Tweak>
      </div>
    </div>
  );
}

function PaletaPicker({ value, onChange }) {
  const keys = Object.keys(PALETAS);
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
      {keys.map(k => {
        const p = PALETAS[k];
        const active = value === k;
        return (
          <button key={k} onClick={() => onChange(k)} style={{
            display: 'flex', alignItems: 'center', gap: 12,
            padding: '10px 12px',
            background: active ? 'var(--surface-2, var(--bg-3))' : 'var(--surface)',
            border: active ? '1.5px solid ' + p.fire : '1px solid var(--border-soft)',
            borderRadius: 10,
            textAlign: 'left',
            transition: 'all 0.15s',
          }}>
            {/* Color dots */}
            <div style={{ display: 'flex', gap: 3 }}>
              <span style={{ width: 14, height: 22, borderRadius: 3, background: p.fire, boxShadow: active ? `0 0 8px ${p.fire}` : 'none' }} />
              <span style={{ width: 14, height: 22, borderRadius: 3, background: p.fireGlow }} />
              <span style={{ width: 14, height: 22, borderRadius: 3, background: p.ember }} />
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div className="serif" style={{ fontSize: 15, lineHeight: 1.1, color: active ? p.fireGlow : 'var(--text)' }}>
                {p.nome}
              </div>
              <div style={{ fontSize: 10.5, color: 'var(--text-faint)', marginTop: 2, letterSpacing: '0.02em' }}>
                {p.subtitulo}
              </div>
            </div>
            {active && <span className="mono" style={{ fontSize: 9, color: p.fireGlow, letterSpacing: '0.15em' }}>ATIVA</span>}
          </button>
        );
      })}
    </div>
  );
}
function Tweak({ label, children }) {
  return (
    <div>
      <div style={{ fontSize: 11, color: 'var(--text-faint)', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 6 }}>{label}</div>
      {children}
    </div>
  );
}
function SegmentedCtrl({ value, onChange, options }) {
  return (
    <div style={{ display: 'flex', background: 'var(--surface)', padding: 3, borderRadius: 8, border: '1px solid var(--border-soft)' }}>
      {options.map(o => (
        <button key={o.v} onClick={() => onChange(o.v)} style={{
          flex: 1, padding: '6px 8px', borderRadius: 6,
          background: value === o.v ? 'var(--fire)' : 'transparent',
          color: value === o.v ? '#fff' : 'var(--text-dim)',
          fontSize: 12, fontWeight: 500,
        }}>{o.l}</button>
      ))}
    </div>
  );
}
function Toggle({ checked, onChange }) {
  return (
    <button onClick={() => onChange(!checked)} style={{
      width: 44, height: 24, borderRadius: 12,
      background: checked ? 'var(--fire)' : 'var(--border)',
      position: 'relative', transition: 'all 0.2s',
    }}>
      <span style={{
        position: 'absolute', top: 2, left: checked ? 22 : 2,
        width: 20, height: 20, borderRadius: '50%', background: '#fff',
        transition: 'left 0.2s',
      }} />
    </button>
  );
}

// ==== MAIN APP =========================================
function App() {
  const [state, setState] = useState(initialState);
  const [selectedPanela, setSelectedPanela] = useState(null);
  const [novaOpen, setNovaOpen] = useState(false);
  const [tweaks, setTweaks] = useState(TWEAKS);
  const [tweaksOpen, setTweaksOpen] = useState(false);

  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch {}
    return () => window.removeEventListener('message', handler);
  }, []);

  // Apply palette tweak
  useEffect(() => {
    const pal = PALETAS[tweaks.palette] || PALETAS["fogo"];
    const s = document.documentElement.style;
    s.setProperty('--fire',      pal.fire);
    s.setProperty('--fire-glow', pal.fireGlow);
    s.setProperty('--ember',     pal.ember);
    // Softs — mesma matiz, com alpha (via color-mix para funcionar com oklch)
    const mix = (c, a) => `color-mix(in oklab, ${c} ${a}%, transparent)`;
    s.setProperty('--fire-soft-04',       mix(pal.fire, 4));
    s.setProperty('--fire-soft-08',       mix(pal.fire, 8));
    s.setProperty('--fire-soft-25',       mix(pal.fire, 25));
    s.setProperty('--fire-soft-30',       mix(pal.fire, 30));
    s.setProperty('--fire-glow-soft-35',  mix(pal.fireGlow, 35));
    s.setProperty('--ember-soft-08',      mix(pal.ember, 8));
    s.setProperty('--ember-soft-12',      mix(pal.ember, 12));
    s.setProperty('--ember-soft-15',      mix(pal.ember, 15));
    s.setProperty('--ember-soft-25',      mix(pal.ember, 25));
    // Fundo radial (duas "auroras")
    s.setProperty('--bg-aura-1', pal.bgTop);
    s.setProperty('--bg-aura-2', pal.bgBottom);
  }, [tweaks.palette]);

  const bocasOcupadas = state.panelas.map(p => p.boca);
  const bocasVazias = Array.from({length: state.fornalha.bocas}, (_, i) => i+1).filter(b => !bocasOcupadas.includes(b));

  return (
    <div className="app-shell">
      <TopBar feitio={state.feitio} />

      <main style={{
        flex: 1,
        display: 'grid',
        gridTemplateColumns: 'minmax(0, 1fr) 380px',
        minHeight: 0,
      }}>
        <Fornalha
          panelas={state.panelas}
          bocas={state.fornalha.bocas}
          onBocaClick={(p) => p && setSelectedPanela(p)}
          onEmptyClick={() => setNovaOpen(true)}
          selectedIds={selectedPanela ? [selectedPanela.id] : []}
          tweaks={tweaks}
        />
        <ToneisPanel toneis={state.toneis} />
      </main>

      <ActionBar
        onNovaPanela={() => setNovaOpen(true)}
        onUndo={() => {}}
        lastEvent={tweaks.showTimeline ? state.eventos[0] : null}
      />

      {selectedPanela && <PanelaDetailModal
        panela={selectedPanela}
        onClose={() => setSelectedPanela(null)}
        onTirar={() => {}}
        onRepor={() => {}}
      />}
      {novaOpen && <NovaPanelaModal
        onClose={() => setNovaOpen(false)}
        bocasVazias={bocasVazias}
        toneis={state.toneis}
      />}

      {tweaksOpen && <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} onClose={() => setTweaksOpen(false)} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
